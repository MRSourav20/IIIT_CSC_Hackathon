<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Practice Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004494;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Government Services Form (Dummy)</h2>
        <form id="applicantForm">
            <div class="form-group">
                <label for="applicant_name">Full Name (As per Aadhaar)</label>
                <input type="text" id="applicant_name" name="applicant_name" placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label for="aadhaar_number">Aadhaar / UIDAI Number</label>
                <input type="text" id="aadhaar_number" name="aadhaar_number" placeholder="12-digit Aadhaar number">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="birth_date">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number">
            </div>

            <div class="form-group">
            <label for="identity_doc">Upload Identity Document (Image)</label>
            <input type="file" id="identity_doc" name="identity_document" accept="image/png, image/jpeg">
        </div>

        <button type="button" onclick="alert('Form submitted successfully! (This is a dummy)')">Submit
                Application</button>
        </form>
    </div>

</body>

</html>
